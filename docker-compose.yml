services:
  web:
    build:
      context: .
      target: ${TARGET:-small-final}
    container_name: filewizard
    restart: unless-stopped
    ports:
      - "${PORT:-6969}:8000"
    volumes:
      - ./config:/app/config
      - ./uploads_data:/app/uploads
      - ./processed_data:/app/processed
    environment:
      - LOCAL_ONLY=True
      - SECRET_KEY=${SECRET_KEY:-}
      - UPLOADS_DIR=/app/uploads
      - PROCESSED_DIR=/app/processed
      - OMP_NUM_THREADS=1
      - DOWNLOAD_KOKORO_ON_STARTUP=${DOWNLOAD_KOKORO_ON_STARTUP:-false}
      # GPU options (uncomment for CUDA target)
      # - TRANSCRIPTION_DEVICE=cuda
      # - TRANSCRIPTION_COMPUTE_TYPE=float16
      # - TRANSCRIPTION_DEVICE_INDEX=0
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Uncomment for GPU access (requires NVIDIA Container Toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
